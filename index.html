<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Jogo de Tiro 3D</title>
<style>
body { margin:0; overflow:hidden; background:black; }
#crosshair{
position:fixed;
top:50%;
left:50%;
width:10px;
height:10px;
margin-left:-5px;
margin-top:-5px;
border:2px solid white;
border-radius:50%;
}
</style>
</head>
<body>

<div id="crosshair"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

let scene = new THREE.Scene();
scene.background = new THREE.Color(0x202020);

let camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight,0.1,1000);

let renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

// luz
let light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(5,10,7);
scene.add(light);

// chão
let floorGeo = new THREE.PlaneGeometry(200,200);
let floorMat = new THREE.MeshStandardMaterial({color:0x555555});
let floor = new THREE.Mesh(floorGeo,floorMat);
floor.rotation.x = -Math.PI/2;
scene.add(floor);

// jogador
camera.position.set(0,2,5);

// inimigos
let enemies = [];

function spawnEnemy(){
let geo = new THREE.BoxGeometry(1,1,1);
let mat = new THREE.MeshStandardMaterial({color:0xff0000});
let cube = new THREE.Mesh(geo,mat);

cube.position.set(
(Math.random()-0.5)*40,
0.5,
(Math.random()-0.5)*40
);

scene.add(cube);
enemies.push(cube);
}

for(let i=0;i<10;i++) spawnEnemy();

// tiro
let raycaster = new THREE.Raycaster();
let mouse = new THREE.Vector2();

window.addEventListener("click",()=>{

raycaster.setFromCamera(mouse,camera);

let hits = raycaster.intersectObjects(enemies);

if(hits.length>0){
scene.remove(hits[0].object);
enemies.splice(enemies.indexOf(hits[0].object),1);
spawnEnemy();
}

});

// movimento
let keys={};

document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

function movePlayer(){

let speed=0.2;

if(keys["w"]) camera.position.z -= speed;
if(keys["s"]) camera.position.z += speed;
if(keys["a"]) camera.position.x -= speed;
if(keys["d"]) camera.position.x += speed;

}

// mouse olhar
document.body.addEventListener("mousemove",e=>{

camera.rotation.y -= e.movementX*0.002;
camera.rotation.x -= e.movementY*0.002;

});

// loop
function animate(){
requestAnimationFrame(animate);

movePlayer();

renderer.render(scene,camera);
}

animate();

</script>
</body>
</html>
