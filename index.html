 <!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Comemoração Barcelona</title>

<style>
body{
    font-family: Arial, sans-serif;
    text-align:center;
    background:#0a1f44;
    color:white;
    margin:0;
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

button{
    padding:15px 30px;
    font-size:20px;
    border:none;
    border-radius:10px;
    background:#a50044;
    color:white;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#edbb00;
    color:#000;
}

#celebracao{
    display:none;
    margin-top:30px;
    font-size:40px;
    animation:aparecer 1s ease;
}

@keyframes aparecer{
    from{transform:scale(0);opacity:0;}
    to{transform:scale(1);opacity:1;}
}

.confete{
    position:fixed;
    width:10px;
    height:10px;
    background:red;
    top:-10px;
    animation:cair 3s linear forwards;
}

@keyframes cair{
    to{
        transform:translateY(100vh) rotate(720deg);
    }
}
</style>
</head>

<body>

<h1>Torcedor?</h1>
<button onclick="comemorar()">Clique aqui</button>

<div id="celebracao">
🎉 VISCA BARÇA! 🔵🔴
</div>

<script>
function comemorar(){
    document.getElementById("celebracao").style.display="block";

    for(let i=0;i<80;i++){
        let confete=document.createElement("div");
        confete.classList.add("confete");

        confete.style.left=Math.random()*100+"vw";
        confete.style.background=[
            "#a50044",
            "#004d98",
            "#edbb00"
        ][Math.floor(Math.random()*3)];

        confete.style.animationDuration=(Math.random()*2+2)+"s";

        document.body.appendChild(confete);

        setTimeout(()=>{confete.remove()},3000);
    }
}
</script>

</body>
</html>
