<h1>hello word!</h1>
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Primeira Página</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #4CAF50;
            color: white;
            padding: 20px;
        }

        main {
            padding: 20px;
        }

        button {
            background-color: #4CAF50;
            border: none;
            color: white;
            padding: 12px 20px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 8px;
        }

        button:hover {
            background-color: #45a049;
        }

        img {
            width: 300px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<header>
    <h1>Bem-vindo ao meu site</h1>
</header>

<main>
    <p>Esta é uma página HTML simples criada como exemplo.</p>

    <img src="https://picsum.photos/300" alt="Imagem de exemplo">

    <br><br>

    <button onclick="alert('Você clicou no botão!')">
        Clique aqui
    </button>
</main>

</body>
</html>
