<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Quiz de Futebol</title>

<style>
body{
    font-family: Arial, sans-serif;
    background: #0a5c2b;
    color: white;
    text-align: center;
    padding: 30px;
}

#quiz-container{
    max-width: 600px;
    margin: auto;
    background: #063b1c;
    padding: 25px;
    border-radius: 10px;
}

button{
    padding: 10px 20px;
    font-size: 16px;
    margin-top: 10px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

.option{
    display: block;
    margin: 8px 0;
    padding: 10px;
    background: #0f7d3c;
}

#nextBtn{
    background: orange;
}

#startBtn{
    background: limegreen;
}

</style>
</head>

<body>

<div id="quiz-container">

<h1>⚽ Quiz de Futebol</h1>

<div id="start-screen">
<p>Teste seus conhecimentos sobre futebol!</p>
<button id="startBtn">Iniciar Quiz</button>
</div>

<div id="quiz-screen" style="display:none;">
<h2 id="question"></h2>
<div id="options"></div>
<button id="nextBtn">Próxima</button>
</div>

<div id="result-screen" style="display:none;">
<h2>Resultado Final</h2>
<p id="score"></p>
<button onclick="location.reload()">Jogar Novamente</button>
</div>

</div>

<script>

const perguntas = [

{
pergunta: "Quem ganhou a Copa do Mundo de 2002?",
opcoes: ["Brasil","Alemanha","Argentina","França"],
resposta: 0
},

{
pergunta: "Qual jogador é conhecido como 'Rei do Futebol'?",
opcoes: ["Maradona","Pelé","Messi","Cristiano Ronaldo"],
resposta: 1
},

{
pergunta: "Qual país sediou a Copa do Mundo de 2014?",
opcoes: ["Rússia","África do Sul","Brasil","Alemanha"],
resposta: 2
},

{
pergunta: "Quantos jogadores cada time tem em campo?",
opcoes: ["9","10","11","12"],
resposta: 2
},

{
pergunta: "Qual clube tem mais Champions League?",
opcoes: ["Barcelona","Real Madrid","Milan","Liverpool"],
resposta: 1
},

{
pergunta: "Quem ganhou a Copa do Mundo de 2018?",
opcoes: ["Alemanha","França","Brasil","Croácia"],
resposta: 1
},

{
pergunta: "Qual jogador tem mais Bolas de Ouro (até 2023)?",
opcoes: ["Cristiano Ronaldo","Messi","Neymar","Ronaldinho"],
resposta: 1
},

{
pergunta: "Qual país ganhou a primeira Copa do Mundo?",
opcoes: ["Brasil","Uruguai","Argentina","Itália"],
resposta: 1
},

{
pergunta: "Qual clube revelou Neymar?",
opcoes: ["Flamengo","Santos","Palmeiras","São Paulo"],
resposta: 1
},

{
pergunta: "Qual seleção tem mais Copas do Mundo?",
opcoes: ["Alemanha","Itália","Brasil","Argentina"],
resposta: 2
}

];

let indice = 0;
let pontuacao = 0;

const startBtn = document.getElementById("startBtn");
const quizScreen = document.getElementById("quiz-screen");
const startScreen = document.getElementById("start-screen");
const resultScreen = document.getElementById("result-screen");
const questionEl = document.getElementById("question");
const optionsEl = document.getElementById("options");
const nextBtn = document.getElementById("nextBtn");

startBtn.onclick = () => {
startScreen.style.display = "none";
quizScreen.style.display = "block";
mostrarPergunta();
};

function mostrarPergunta(){

let q = perguntas[indice];
questionEl.textContent = (indice+1)+". "+q.pergunta;
optionsEl.innerHTML = "";

q.opcoes.forEach((opcao,i)=>{
let btn = document.createElement("button");
btn.textContent = opcao;
btn.classList.add("option");
btn.onclick = ()=>selecionarResposta(i);
optionsEl.appendChild(btn);
});

}

function selecionarResposta(i){

if(i === perguntas[indice].resposta){
pontuacao++;
}

Array.from(optionsEl.children).forEach(btn=>{
btn.disabled = true;
});

}

nextBtn.onclick = ()=>{

indice++;

if(indice < perguntas.length){
mostrarPergunta();
}else{
mostrarResultado();
}

};

function mostrarResultado(){

quizScreen.style.display = "none";
resultScreen.style.display = "block";

document.getElementById("score").textContent =
"Você acertou "+pontuacao+" de "+perguntas.length+" perguntas!";

}

</script>

</body>
</html>
