<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Spider-Runner</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(#ff9966,#663399);
    overflow:hidden;
}

#game{
    width:800px;
    height:400px;
    margin:auto;
    position:relative;
    background:linear-gradient(#ff9966,#222);
    border:3px solid black;
}

#ground{
    position:absolute;
    bottom:0;
    width:100%;
    height:80px;
    background:#333;
}

#player{
    position:absolute;
    bottom:80px;
    left:120px;
    width:40px;
    height:60px;
    background:red;
    border-radius:8px;
}

.coin{
    position:absolute;
    width:20px;
    height:20px;
    background:gold;
    border-radius:50%;
}

.obstacle{
    position:absolute;
    bottom:80px;
    width:50px;
    height:40px;
}

.car{ background:#2196f3; }
.trash{ background:#4caf50; width:35px; }

#ui{
    position:absolute;
    top:5px;
    left:10px;
    color:white;
}

#shop{
    position:absolute;
    top:50px;
    left:10px;
    color:white;
}
button{
    padding:5px;
}
</style>
</head>

<body>

<h2 style="text-align:center;color:white">Spider-Runner</h2>

<div id="game">

<div id="ui">
Pontuação: <span id="score">0</span> |
Moedas: <span id="coins">0</span> |
Recorde: <span id="record">0</span>
</div>

<div id="shop">
<button id="buyGwen">Comprar Gwen (2000 moedas)</button>
</div>

<div id="player"></div>
<div id="ground"></div>

</div>

<script>

let player = document.getElementById("player")
let game = document.getElementById("game")

let score = 0
let coins = 0
let record = localStorage.getItem("record") || 0
document.getElementById("record").innerText = record

let posY = 0
let jumping = false
let speed = 5
let character = "miles"

function jump(){
if(!jumping){
jumping = true
let up = setInterval(()=>{
posY +=5
player.style.bottom = (80+posY)+"px"
if(posY>=120) clearInterval(up)
},20)

let down = setInterval(()=>{
posY -=5
player.style.bottom = (80+posY)+"px"
if(posY<=0){
posY=0
jumping=false
clearInterval(down)
}
},20)
}
}

document.addEventListener("keydown",e=>{
if(e.key=="ArrowUp") jump()
})

function spawnObstacle(){

let obs = document.createElement("div")
obs.classList.add("obstacle")

if(Math.random()<0.5){
obs.classList.add("car")
}else{
obs.classList.add("trash")
}

obs.style.left="800px"
game.appendChild(obs)

let move=setInterval(()=>{

let x=parseInt(obs.style.left)
obs.style.left=(x-speed)+"px"

if(x<160 && x>110 && posY<40){
gameOver()
}

if(x<-50){
obs.remove()
clearInterval(move)
}

},20)

}

function spawnCoin(){

let coin=document.createElement("div")
coin.classList.add("coin")
coin.style.left="800px"
coin.style.bottom=(100+Math.random()*80)+"px"
game.appendChild(coin)

let move=setInterval(()=>{

let x=parseInt(coin.style.left)
coin.style.left=(x-speed)+"px"

let coinY=parseInt(coin.style.bottom)

if(x<160 && x>110 && Math.abs(coinY-(80+posY))<40){
coins++
document.getElementById("coins").innerText=coins
coin.remove()
clearInterval(move)
}

if(x<-20){
coin.remove()
clearInterval(move)
}

},20)

}

function gameLoop(){

score++
document.getElementById("score").innerText=score

if(score%120==0) spawnObstacle()
if(score%200==0) spawnCoin()

}

function gameOver(){

if(score>record){
record=score
localStorage.setItem("record",record)
}

alert("Game Over!")

location.reload()

}

setInterval(gameLoop,50)

document.getElementById("buyGwen").onclick=function(){

if(coins>=2000){
coins-=2000
character="gwen"
player.style.background="white"
alert("Gwen desbloqueada!")
}else{
alert("Você precisa de 2000 moedas!")
}

}

</script>

</body>
</html>
